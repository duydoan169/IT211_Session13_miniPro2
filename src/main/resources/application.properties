spring.application.name=miniProject

spring.datasource.url=jdbc:mysql://localhost:3306/mini_project2?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456789

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

logging.level.root=INFO
logging.level.org.example.miniproject.controller=DEBUG
logging.level.org.example.miniproject.service=DEBUG
logging.pattern.console=%d{HH:mm:ss} %clr([%level]){green} %clr(%logger{36}){cyan} - %msg%n